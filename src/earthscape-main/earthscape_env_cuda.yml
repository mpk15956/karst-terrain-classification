name: earthscape
channels:
  - conda-forge
  - defaults
dependencies:
  - geopandas
  - matplotlib
  - numpy
  - python
  - rasterio
  - ipykernel
  - jupyterlab
  - pip
  - pip:
    - torch
    - torchvision
    - --extra-index-url https://download.pytorch.org/whl/cu124
  - whitebox
  - seaborn
  - ipywidgets
  - tqdm